<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="container">
    <div class="todo-app">

        <h1>To-Do App</h1>

        <!-- Progress Box -->
        <div class="progress-box">
            <div class="progress-text">
                <p id="progress-label">Keep it Up!</p>
                <div class="progress-bar-wrap">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
            <div class="progress-circle">
                <span id="progress-count">0 / 0</span>
            </div>
        </div>

        <!-- Input Area -->
        <form class="input-area" id="task-form">
            <input type="text" id="task-input" placeholder="Add a new task..." autocomplete="off">
            <input type="date" id="due-date-input" title="Set due date">
            <button type="submit" id="add-task-btn">
                <i class="fa-solid fa-plus"></i>
            </button>
        </form>

        <!-- Active Tasks -->
        <div class="todos-container">
            <ul id="task-list"></ul>
            <div class="empty-state" id="empty-state">
                <img src="./images/empty.png" alt="No tasks" class="empty-img">
                <p>No tasks yet! Add one above.</p>
            </div>
        </div>

        <!-- Completed Tasks Collapsible -->
        <div class="completed-section" id="completed-section" style="display:none;">
            <button class="completed-toggle" id="completed-toggle">
                <span id="completed-toggle-label">Completed (0)</span>
                <i class="fa-solid fa-chevron-down toggle-icon" id="toggle-icon"></i>
            </button>
            <ul id="completed-list"></ul>
        </div>

    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3>Edit Task</h3>
        <input type="text" id="edit-input" placeholder="Update task...">
        <div class="modal-due">
            <label><i class="fa-regular fa-calendar"></i> Due Date</label>
            <input type="date" id="edit-due-input">
        </div>
        <div class="modal-btns">
            <button id="cancel-edit-btn">Cancel</button>
            <button id="save-edit-btn">Save</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
